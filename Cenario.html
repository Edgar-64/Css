<div class="parallax-container" onclick="fazerPular()">
  <div class="layer clouds"></div>
  <div class="layer mountains"></div>
  <div id="player" class="pulo-simples"></div>
  <div class="layer ground"></div>
</div>

<style>
  .parallax-container {
    position: relative;
    width: 100%;
    height: 400px;
    overflow: hidden;
    background: #87CEEB;
    cursor: pointer; /* Indica que é clicável */
  }

  .layer {
    position: absolute;
    width: 200%;
    height: 100%;
    top: 0;
    left: 0;
    background-repeat: repeat-x;
    background-position: left bottom;
  }

  .clouds {
    background-image: url('nuvem.png');
    background-size: 500px auto;
    animation: slide-bg 40s linear infinite;
    z-index: 1;
    opacity: 0.8;
  }

  .mountains {
    background-image: url('montanha.png');
    background-size: 800px 200px;
    animation: slide-bg 20s linear infinite;
    z-index: 2;
  }

  /* AJUSTE: O Fusca deve ter o z-index maior que as montanhas e o chão */
  .pulo-simples {
    width: 200px; 
    height: 200px;
    background-image: url('fusca.png');
    background-size: contain;    /* Garante que o fusca apareça inteiro */
    background-repeat: no-repeat;
    position: absolute;
    bottom: auto; /* Ajustado para tocar o chão perfeitamente */
    left: 100px;
    z-index: 10;  /* Colocado bem à frente */
  }

  .ground {
    background-image: url('chao.png');
    background-size: 200px 50px;
    animation: slide-bg 5s linear infinite;
    z-index: 5; /* Atrás do Fusca, mas na frente das montanhas */
    height: 50px;
    top: auto;
    bottom: 0;
  }

  /* Classe de animação disparada pelo JS */
  .animate-jump {
    animation: jump-action 0.6s ease-in-out;
  }

  @keyframes jump-action {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-120px) rotate(-5deg); } /* Altura e uma leve inclinação */
    100% { transform: translateY(0) rotate(0deg); }
  }

  @keyframes slide-bg {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
</style>

<script>
function fazerPular() {
  const player = document.getElementById('player');
  
  if (player.classList.contains('animate-jump')) return;

  player.classList.add('animate-jump');

  setTimeout(() => {
    player.classList.remove('animate-jump');
  }, 600); 
}
</script>
