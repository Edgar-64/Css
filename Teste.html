<div class="game-scene"></div>
<style>
    .game-scene {
  width: 100%;
  height: 400px;
  background-image: url('sua-imagem-aqui.png');
  background-repeat: repeat-x; /* Repete a imagem horizontalmente */
  background-size: contain;    /* Ou 'cover', dependendo da sua imagem */
  
  /* Nome da animação | Duração | Curva de tempo | Repetição */
  animation: slide-bg 10s linear infinite;
}

@keyframes slide-bg {
  from {
    background-position: 0 0;
  }
  to {
    background-position: -100% 0; /* Move a imagem para a esquerda */
  }
}
</style>
